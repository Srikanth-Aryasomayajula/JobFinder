name: Job Finder Bot

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # IMPORTANT for pushing jobs.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python scripts/scrape_jobs.py

      - name: Commit updated jobs.json
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "job-bot"
          git add jobs.json
          git commit -m "update jobs" || echo "no changes"
          git push